<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Todo</title>
    <style>
      :root {
        --fg: rgba(255, 255, 255, 0.95);
        --fg-dim: rgba(255, 255, 255, 0.55);
        --accent: #6c8cff;
        --danger: #ff7676;
        --glass: rgba(18, 18, 22, 0.32);
        --glass-line: rgba(255, 255, 255, 0.13);
        --blur: blur(16px);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; background: transparent;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        color: var(--fg); -webkit-user-select: none; user-select: none; overflow: hidden;
      }
      .glass {
        background: var(--glass);
        -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
        border: 1px solid var(--glass-line); border-radius: 11px;
      }
      .panel { display: flex; flex-direction: column; gap: 6px; padding: 4px; }
      header {
        -webkit-app-region: drag;
        display: flex; align-items: center; gap: 6px; padding: 6px 10px; margin: 0 10px;
      }
      header .title { font-size: 12px; font-weight: 600; color: var(--fg-dim); flex: 1; }
      header button {
        -webkit-app-region: no-drag; background: transparent; border: none;
        color: var(--fg-dim); font-size: 13px; cursor: pointer; padding: 1px 5px; border-radius: 6px;
      }
      header button:hover { background: rgba(255,255,255,0.12); color: var(--fg); }

      .add { -webkit-app-region: no-drag; display: flex; flex-direction: column; gap: 6px; margin: 0 10px; }
      .add input {
        width: 100%; color: var(--fg); padding: 7px 10px; font-size: 13px; outline: none;
      }
      .add input::placeholder { color: var(--fg-dim); }
      .add-row2 { display: flex; gap: 6px; position: relative; }
      .add-row2 .cat-wrap { position: relative; flex: 1; }
      .add-row2 .cat-wrap input { width: 100%; }
      .add-row2 button {
        -webkit-app-region: no-drag;
        background: rgba(255, 255, 255, 0.1); color: var(--fg);
        border: 1px solid var(--glass-line); border-radius: 9px;
        padding: 0 14px; font-size: 18px; line-height: 1; cursor: pointer;
      }
      .add-row2 button:hover { background: rgba(255, 255, 255, 0.18); }

      /* 접힌 미니 알약 */
      #mini {
        -webkit-app-region: no-drag;
        display: flex; align-items: center; justify-content: center;
        margin: 0; padding: 8px 12px; font-size: 13px; font-weight: 600;
        color: var(--fg); cursor: pointer; gap: 6px;
      }
      #mini:hover { background: rgba(40, 40, 46, 0.5); }
      /* 카테고리 히스토리 드롭다운 */
      .cat-drop {
        position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 10;
        max-height: 160px; overflow-y: auto; padding: 4px; display: none;
      }
      .cat-drop.open { display: block; }
      .cat-drop .opt {
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
        padding: 6px 8px; font-size: 13px; border-radius: 7px; cursor: pointer;
      }
      .cat-drop .opt:hover, .cat-drop .opt.active { background: rgba(255,255,255,0.14); }
      .cat-drop .opt-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .cat-drop .opt-x {
        flex: none; opacity: 0; font-size: 11px; color: var(--fg-dim);
        padding: 1px 5px; border-radius: 5px;
      }
      .cat-drop .opt:hover .opt-x { opacity: 0.65; }
      .cat-drop .opt-x:hover { opacity: 1; color: var(--danger); background: rgba(255,118,118,0.18); }

      .list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; overflow-x: hidden; padding: 8px 10px; }
      .list::-webkit-scrollbar { width: 5px; }
      .list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

      .cat-head {
        -webkit-app-region: no-drag;
        display: flex; align-items: center; gap: 6px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.55);
        padding: 5px 10px; cursor: pointer;
        background: rgba(18, 18, 22, 0.5);
        -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
        border: 1px solid var(--glass-line);
        border-radius: 9px;
      }
      .cat-head .chev { font-size: 9px; width: 10px; }
      .group { display: flex; flex-direction: column; gap: 6px; }

      .task {
        -webkit-app-region: no-drag;
        display: flex; align-items: flex-start; gap: 9px; padding: 8px 10px;
      }
      .task.dragging { opacity: 0.4; }
      .grip {
        flex: none; align-self: center; color: var(--fg-dim);
        font-size: 12px; line-height: 1; cursor: grab; padding: 0 1px; user-select: none;
      }
      .grip:active { cursor: grabbing; }
      .cgrip {
        color: var(--fg-dim); font-size: 11px; cursor: grab; user-select: none; margin-right: 1px;
      }
      .cat-head.dragging { opacity: 0.5; }
      .del {
        flex: none; align-self: center; color: var(--fg-dim); font-size: 12px;
        cursor: pointer; opacity: 0; padding: 2px 5px; border-radius: 6px; white-space: nowrap;
      }
      .task:hover .del { opacity: 0.6; }
      .del:hover { opacity: 1; background: rgba(255,118,118,0.15); color: var(--danger); }
      .del.armed { opacity: 1; color: var(--danger); font-size: 11px; font-weight: 600; }
      /* 상세 노트 아이콘 */
      .note {
        flex: none; align-self: center; cursor: pointer; color: var(--fg-dim);
        opacity: 0; padding: 2px 4px; border-radius: 6px; line-height: 1;
      }
      .task:hover .note { opacity: 0.6; }
      .note:hover { opacity: 1; background: rgba(255,255,255,0.12); color: var(--fg); }
      .note.has { opacity: 0.95; color: #1bf5ee; } /* 상세 있으면 상시 표시 */
      /* 상세 편집 패널 */
      .detail-edit { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
      .detail-edit textarea {
        width: 100%; resize: vertical; font-family: inherit; font-size: 12px;
        color: var(--fg); background: rgba(255,255,255,0.08);
        border: 1px solid var(--glass-line); border-radius: 8px; padding: 6px 8px; outline: none;
      }
      .detail-bar { display: flex; gap: 6px; justify-content: flex-end; }
      .detail-bar button {
        background: rgba(255,255,255,0.1); border: none; color: var(--fg);
        padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
      }
      .detail-bar button:hover { background: rgba(255,255,255,0.18); }
      .detail-bar button.cta { background: rgba(108,140,255,0.5); }
      .detail-bar button.cta:hover { background: rgba(108,140,255,0.7); }
      .task input[type="checkbox"] {
        appearance: none; -webkit-appearance: none;
        width: 16px; height: 16px; flex: none; margin: 1px 0 0; cursor: pointer;
        position: relative; border-radius: 5px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: background 0.12s, border-color 0.12s;
      }
      .task input[type="checkbox"]:hover { border-color: rgba(255, 255, 255, 0.5); }
      .task input[type="checkbox"]:checked {
        background: rgba(108, 140, 255, 0.45);
        border-color: rgba(108, 140, 255, 0.7);
      }
      .task input[type="checkbox"]:checked::after {
        content: ""; position: absolute; left: 5px; top: 2px;
        width: 3.5px; height: 7px; border: solid rgba(255, 255, 255, 0.9);
        border-width: 0 2px 2px 0; transform: rotate(45deg);
      }
      .task .main { flex: 1; min-width: 0; }
      .task .body { font-size: 13px; line-height: 1.3; text-shadow: 0 1px 2px rgba(0,0,0,0.4); cursor: pointer; display: flex; align-items: center; gap: 6px; }
      .task .body .twist { font-size: 9px; color: var(--fg-dim); }
      .task .due { font-size: 11px; color: var(--fg-dim); margin-top: 3px; }
      .task .due.overdue { color: var(--danger); }

      /* D-N 마감 배지 (우측) */
      .due-badge {
        -webkit-app-region: no-drag; flex: none; align-self: center;
        font-size: 11px; font-weight: 600; color: var(--fg-dim);
        cursor: pointer; padding: 2px 5px; border-radius: 6px; white-space: nowrap;
      }
      .due-badge:hover { background: rgba(255,255,255,0.12); }
      .due-badge.urgent { color: #1bf5ee; }
      .due-badge.overdue { color: var(--danger); }
      /* 마감 없음: 달력 아이콘, hover 시에만 (공간 절약) */
      .due-badge.due-add { opacity: 0; padding: 2px 4px; }
      .task:hover .due-badge.due-add { opacity: 0.6; }
      .due-badge.due-add:hover { opacity: 1; background: rgba(255,255,255,0.12); }
      .due-badge svg, .note svg { display: block; }

      /* D-1 임박: 청록 테두리 글로우 애니메이션 */
      @keyframes glowpulse {
        0%, 100% {
          box-shadow: 0 0 3px rgba(27,245,238,0.5), inset 0 0 2px rgba(27,245,238,0.3);
          border-color: rgba(27,245,238,0.6);
        }
        50% {
          box-shadow: 0 0 8px rgba(27,245,238,1), inset 0 0 7px rgba(27,245,238,0.55);
          border-color: rgba(27,245,238,1);
        }
      }
      .task.glow {
        border-color: rgba(27,245,238,0.8);
        animation: glowpulse 1.6s ease-in-out infinite;
      }
      .task .detail {
        font-size: 12px; color: rgba(255,255,255,0.8); white-space: pre-wrap;
        margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.1);
        line-height: 1.4;
      }
      /* 커스텀 달력 */
      .cal { -webkit-app-region: no-drag; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
      .cal-head { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 600; }
      .cal-head button { background: transparent; border: none; color: var(--fg); cursor: pointer; font-size: 16px; padding: 0 10px; border-radius: 6px; }
      .cal-head button:hover { background: rgba(255,255,255,0.12); }
      .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
      .cal-grid .wd { font-size: 10px; color: var(--fg-dim); text-align: center; padding: 2px 0; }
      .cal-grid .day { font-size: 12px; text-align: center; padding: 5px 0; border-radius: 6px; cursor: pointer; }
      .cal-grid .day:hover { background: rgba(255,255,255,0.15); }
      .cal-grid .day.today { outline: 1px solid rgba(255,255,255,0.35); }
      .cal-grid .day.sel { background: var(--accent); color: #fff; }
      .cal-grid .day.blank { cursor: default; }
      .cal-foot { display: flex; gap: 5px; justify-content: space-between; }
      .cal-foot button {
        flex: 1; background: rgba(255,255,255,0.1); border: none; color: var(--fg);
        padding: 5px 4px; border-radius: 6px; cursor: pointer; font-size: 11px;
      }
      .cal-foot button:hover { background: rgba(255,255,255,0.18); }

      .more {
        -webkit-app-region: no-drag; text-align: center; font-size: 12px;
        color: var(--fg-dim); padding: 6px; cursor: pointer;
      }
      .more:hover { color: var(--fg); }
      .empty { color: var(--fg-dim); font-style: italic; font-size: 13px; padding: 10px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="panel" id="panel">
      <header class="glass">
        <span class="title" id="title">✓ 할 일</span>
        <button id="refresh" title="새로고침">↻</button>
        <button id="mini-btn" title="접기">–</button>
        <button id="quit" title="숨기기 (⌘⌥T 로 복귀)">✕</button>
      </header>
      <div class="add">
        <input id="add-desc" class="glass" type="text" placeholder="할 일 추가…" />
        <div class="add-row2">
          <div class="cat-wrap">
            <input id="add-cat" class="glass" type="text" placeholder="카테고리 (선택)" autocomplete="off" />
            <div class="cat-drop glass" id="cat-drop"></div>
          </div>
          <button id="add-btn" title="추가">+</button>
        </div>
      </div>
      <div class="list" id="list"></div>
    </div>
    <div id="mini" class="glass" style="display:none">
      <span id="mini-count">✓ 0</span>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const MARGIN = 12, PAGE = 10, NONE = "␀"; // 미분류 키
      let open = [], allCats = [], expanded = false, mini = false;
      const collapsed = new Set();
      const editingDetails = new Set();

      const todayStr = () => {
        const d = new Date();
        const p = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
      };
      function daysUntil(due) {
        if (!due) return null;
        const [y, m, d] = due.split("-").map(Number);
        const dd = new Date(y, m - 1, d);
        const now = new Date();
        const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        return Math.round((dd - t0) / 86400000);
      }
      function dLabel(n) {
        if (n === null) return null;
        if (n === 0) return "D-DAY";
        return n > 0 ? `D-${n}` : `D+${-n}`;
      }
      // 라인 기반 아이콘 (얇은 stroke SVG)
      const NOTE_SVG =
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 5h14M5 10h14M5 15h9"/></svg>';
      const CAL_SVG =
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/></svg>';

      function resizeMini() {
        $("mini-count").textContent = `✓ ${open.length}`;
        requestAnimationFrame(() => {
          const h = Math.ceil($("mini").getBoundingClientRect().height) + 2;
          window.todoAPI.resize(h, 120);
        });
      }
      function setMini(on) {
        mini = on;
        $("panel").style.display = on ? "none" : "flex";
        $("mini").style.display = on ? "flex" : "none";
        if (on) resizeMini();
        else render();
      }
      function applyHeight() {
        if (mini) return;
        const header = document.querySelector("header");
        const add = document.querySelector(".add");
        const maxList = (window.screen.availHeight || 900) - MARGIN * 2 -
          header.offsetHeight - add.offsetHeight - 50;
        $("list").style.maxHeight = Math.max(60, maxList) + "px";
        requestAnimationFrame(() => {
          const h = Math.ceil($("panel").getBoundingClientRect().height) + 2;
          window.todoAPI.resize(h);
        });
      }

      function buildGroups() {
        const order = [], map = new Map();
        for (const t of open) {
          const key = t.category || NONE;
          if (!map.has(key)) { map.set(key, []); order.push(key); }
          map.get(key).push(t);
        }
        return order.map((key) => ({ key, label: key === NONE ? "미분류" : key, items: map.get(key) }));
      }

      function makeTask(t) {
        const row = document.createElement("div");
        row.className = "task glass";
        row.dataset.raw = t.raw;

        const grip = document.createElement("div");
        grip.className = "grip";
        grip.textContent = "⠿";
        grip.title = "드래그로 순서/카테고리 이동";
        grip.addEventListener("mousedown", (e) => startTaskDrag(e, t, row));

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.addEventListener("change", async () => {
          cb.disabled = true;
          open = (await window.todoAPI.toggle(t)).filter((x) => !x.completed);
          render();
        });

        const main = document.createElement("div");
        main.className = "main";
        const body = document.createElement("div");
        body.className = "body";
        body.textContent = t.description;
        main.appendChild(body);

        // 상세내용 노트 아이콘 (hover 시 표시 / 상세 있으면 상시 표시)
        const note = document.createElement("div");
        note.className = "note" + (t.detail ? " has" : "");
        note.innerHTML = NOTE_SVG;
        note.title = "상세내용";
        note.addEventListener("click", (e) => {
          e.stopPropagation();
          if (editingDetails.has(t.raw)) editingDetails.delete(t.raw);
          else editingDetails.add(t.raw);
          render();
        });

        // 마감 D-N 배지 (클릭 → 날짜 선택)
        const n = daysUntil(t.dueDate);
        if (n === 1) row.classList.add("glow"); // D-1 임박 글로우
        const badge = document.createElement("div");
        badge.className = "due-badge";
        if (n === null) {
          badge.classList.add("due-add"); // 마감 없음 → 달력 아이콘(hover 시)
          badge.innerHTML = CAL_SVG;
          badge.title = "기한 지정";
        } else {
          badge.textContent = dLabel(n);
          if (n < 0) badge.classList.add("overdue");
          else if (n <= 1) badge.classList.add("urgent");
        }
        badge.addEventListener("click", (e) => {
          e.stopPropagation();
          openPicker(t);
        });

        // 삭제 (한 번 누르면 "삭제?" 확인, 다시 누르면 삭제)
        const del = document.createElement("div");
        del.className = "del";
        del.textContent = "✕";
        del.title = "삭제";
        let armed = false, timer = null;
        del.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (!armed) {
            armed = true;
            del.classList.add("armed");
            del.textContent = "삭제?";
            timer = setTimeout(() => {
              armed = false;
              del.classList.remove("armed");
              del.textContent = "✕";
            }, 1800);
            return;
          }
          clearTimeout(timer);
          open = (await window.todoAPI.delete(t)).filter((x) => !x.completed);
          render();
        });

        row.append(grip, cb, main, note, badge, del);
        return row;
      }

      // 상세내용 편집 패널 (노트 아이콘 클릭 시 열림)
      function makeDetailEditor(t) {
        const box = document.createElement("div");
        box.className = "detail-edit glass";
        const ta = document.createElement("textarea");
        ta.value = t.detail || "";
        ta.placeholder = "상세내용 입력…";
        ta.rows = 4;
        const bar = document.createElement("div");
        bar.className = "detail-bar";
        const save = document.createElement("button");
        save.className = "cta";
        save.textContent = "저장";
        save.addEventListener("click", async () => {
          open = (await window.todoAPI.updateDetail(t, ta.value)).filter((x) => !x.completed);
          editingDetails.delete(t.raw);
          render();
        });
        const close = document.createElement("button");
        close.textContent = "닫기";
        close.addEventListener("click", () => { editingDetails.delete(t.raw); render(); });
        bar.append(save, close);
        box.append(ta, bar);
        setTimeout(() => ta.focus(), 0);
        return box;
      }

      // ── 커스텀 달력 (네이티브 팝업이 투명창에서 안 떠서 직접 그림) ──
      let datePickerFor = null;
      let pv = { y: 0, m: 0 }; // 보고 있는 연/월(0-based)
      function openPicker(t) {
        const base = t.dueDate ? t.dueDate.split("-").map(Number) : null;
        const d = base ? new Date(base[0], base[1] - 1, base[2]) : new Date();
        pv = { y: d.getFullYear(), m: d.getMonth() };
        datePickerFor = datePickerFor === t.raw ? null : t.raw; // 같은 것 다시 누르면 닫기
        render();
      }
      const fmt = (y, m, d) => {
        const p = (n) => String(n).padStart(2, "0");
        return `${y}-${p(m + 1)}-${p(d)}`;
      };
      async function applyDue(t, date) {
        open = (await window.todoAPI.setDue(t, date || "")).filter((x) => !x.completed);
        datePickerFor = null;
        render();
      }
      function makeCalendar(t) {
        const cal = document.createElement("div");
        cal.className = "cal glass";

        const head = document.createElement("div");
        head.className = "cal-head";
        const prev = document.createElement("button");
        prev.textContent = "‹";
        const lab = document.createElement("span");
        lab.textContent = `${pv.y}년 ${pv.m + 1}월`;
        const next = document.createElement("button");
        next.textContent = "›";
        prev.onclick = () => { pv.m--; if (pv.m < 0) { pv.m = 11; pv.y--; } render(); };
        next.onclick = () => { pv.m++; if (pv.m > 11) { pv.m = 0; pv.y++; } render(); };
        head.append(prev, lab, next);
        cal.appendChild(head);

        const grid = document.createElement("div");
        grid.className = "cal-grid";
        ["일", "월", "화", "수", "목", "금", "토"].forEach((w) => {
          const e = document.createElement("div");
          e.className = "wd"; e.textContent = w; grid.appendChild(e);
        });
        const first = new Date(pv.y, pv.m, 1).getDay();
        const days = new Date(pv.y, pv.m + 1, 0).getDate();
        for (let i = 0; i < first; i++) {
          grid.appendChild(Object.assign(document.createElement("div"), { className: "day blank" }));
        }
        const today = todayStr();
        for (let d = 1; d <= days; d++) {
          const cell = document.createElement("div");
          cell.className = "day";
          cell.textContent = d;
          const ds = fmt(pv.y, pv.m, d);
          if (ds === today) cell.classList.add("today");
          if (ds === t.dueDate) cell.classList.add("sel");
          cell.onclick = () => applyDue(t, ds);
          grid.appendChild(cell);
        }
        cal.appendChild(grid);

        const foot = document.createElement("div");
        foot.className = "cal-foot";
        const mk = (label, fn) => {
          const b = document.createElement("button");
          b.textContent = label; b.onclick = fn; return b;
        };
        const tmr = new Date(); tmr.setDate(tmr.getDate() + 1);
        foot.append(
          mk("오늘", () => applyDue(t, today)),
          mk("내일", () => applyDue(t, fmt(tmr.getFullYear(), tmr.getMonth(), tmr.getDate()))),
          mk("지우기", () => applyDue(t, "")),
          mk("닫기", () => { datePickerFor = null; render(); })
        );
        cal.appendChild(foot);
        return cal;
      }

      // ── 포인터 기반 드래그 (투명창에서 HTML5 DnD 가 안 돼서 직접 구현) ──
      let dragSt = null;
      function startTaskDrag(e, task, rowEl) {
        e.preventDefault(); e.stopPropagation();
        dragSt = { kind: "task", task, el: rowEl, moved: false, x: e.clientX, y: e.clientY };
        rowEl.classList.add("dragging");
        document.addEventListener("mousemove", onDragMove);
        document.addEventListener("mouseup", onDragUp);
      }
      function startCatDrag(e, catKey, headEl) {
        e.preventDefault(); e.stopPropagation();
        dragSt = { kind: "cat", cat: catKey, el: headEl, moved: false, x: e.clientX, y: e.clientY };
        headEl.classList.add("dragging");
        document.addEventListener("mousemove", onDragMove);
        document.addEventListener("mouseup", onDragUp);
      }
      function onDragMove(e) {
        if (!dragSt) return;
        dragSt.moved = true; dragSt.x = e.clientX; dragSt.y = e.clientY;
        const under = document.elementFromPoint(e.clientX, e.clientY);
        if (!under) return;
        if (dragSt.kind !== "task") return; // 카테고리는 drop 시점에만 계산
        const overTask = under.closest(".task");
        if (overTask && overTask !== dragSt.el) {
          const box = overTask.getBoundingClientRect();
          const before = e.clientY < box.top + box.height / 2;
          overTask.parentNode.insertBefore(dragSt.el, before ? overTask : overTask.nextSibling);
          return;
        }
        const overHead = under.closest(".cat-head");
        if (overHead) {
          const grp = overHead.nextElementSibling;
          if (grp && grp.classList.contains("group")) grp.insertBefore(dragSt.el, grp.firstChild);
          return;
        }
        const overGroup = under.closest(".group");
        if (overGroup && !overGroup.contains(dragSt.el)) overGroup.appendChild(dragSt.el);
      }
      async function onDragUp() {
        document.removeEventListener("mousemove", onDragMove);
        document.removeEventListener("mouseup", onDragUp);
        const st = dragSt; dragSt = null;
        if (!st) return;
        st.el.classList.remove("dragging");
        if (!st.moved) return; // 그냥 클릭

        if (st.kind === "task") {
          const groupEl = st.el.closest(".group");
          const catKey = groupEl ? groupEl.dataset.cat : NONE;
          const toCategory = catKey === NONE ? null : catKey;
          let sib = st.el.nextElementSibling;
          while (sib && !sib.classList.contains("task")) sib = sib.nextElementSibling;
          const beforeRaw = sib ? sib.dataset.raw : null;
          open = (await window.todoAPI.move(st.task, toCategory, beforeRaw)).filter((x) => !x.completed);
          allCats = await window.todoAPI.categories();
          render();
        } else {
          const tgt = document.elementFromPoint(st.x, st.y);
          const overHead = tgt && tgt.closest(".cat-head");
          let beforeName = null;
          if (overHead && overHead.dataset.realname) {
            const box = overHead.getBoundingClientRect();
            if (st.y < box.top + box.height / 2) beforeName = overHead.dataset.realname;
            else {
              const heads = [...document.querySelectorAll(".cat-head")];
              const i = heads.indexOf(overHead);
              beforeName = heads[i + 1] ? heads[i + 1].dataset.realname || null : null;
            }
          }
          if (st.cat !== NONE) {
            open = (await window.todoAPI.moveCategory(st.cat, beforeName)).filter((x) => !x.completed);
            render();
          }
        }
      }

      function render() {
        $("title").textContent = `✓ 할 일 ${open.length}`;
        const list = $("list");
        list.innerHTML = "";
        if (open.length === 0) {
          const e = document.createElement("div");
          e.className = "empty"; e.textContent = "모두 완료 🎉";
          list.appendChild(e); applyHeight(); return;
        }
        const groups = buildGroups();
        let budget = expanded ? Infinity : PAGE;

        for (const g of groups) {
          const head = document.createElement("div");
          head.className = "cat-head";
          head.dataset.cat = g.key;
          if (g.key !== NONE) head.dataset.realname = g.key;
          const isCollapsed = collapsed.has(g.key);
          // 실제 카테고리만 드래그 그립(카테고리 순서 변경)
          if (g.key !== NONE) {
            const cg = document.createElement("span");
            cg.className = "cgrip";
            cg.textContent = "⠿";
            cg.title = "드래그로 카테고리 순서 변경";
            cg.addEventListener("mousedown", (e) => startCatDrag(e, g.key, head));
            cg.addEventListener("click", (e) => e.stopPropagation());
            head.appendChild(cg);
          }
          const chev = document.createElement("span");
          chev.className = "chev";
          chev.textContent = isCollapsed ? "▶" : "▼";
          head.appendChild(chev);
          head.appendChild(document.createTextNode(`${g.label} (${g.items.length})`));
          head.addEventListener("click", () => {
            if (collapsed.has(g.key)) collapsed.delete(g.key);
            else collapsed.add(g.key);
            render();
          });
          list.appendChild(head);

          if (isCollapsed) continue;
          const groupEl = document.createElement("div");
          groupEl.className = "group";
          groupEl.dataset.cat = g.key;
          const take = g.items.slice(0, Math.max(0, budget));
          take.forEach((t) => {
            groupEl.appendChild(makeTask(t));
            if (editingDetails.has(t.raw)) groupEl.appendChild(makeDetailEditor(t));
            if (datePickerFor === t.raw) groupEl.appendChild(makeCalendar(t));
          });
          budget -= take.length;
          list.appendChild(groupEl);
        }

        if (open.length > PAGE) {
          const more = document.createElement("div");
          more.className = "more glass";
          more.textContent = expanded ? "접기 ▲" : `더 보기 ▼ (+${open.length - PAGE})`;
          more.addEventListener("click", () => { expanded = !expanded; render(); });
          list.appendChild(more);
        }
        applyHeight();
      }

      // ── 카테고리 콤보박스 ──
      const catInput = $("add-cat"), catDrop = $("cat-drop");
      function showCatDrop() {
        const q = catInput.value.toLowerCase().trim();
        const items = (q ? allCats.filter((c) => c.toLowerCase().includes(q)) : allCats).slice(0, 30);
        catDrop.innerHTML = "";
        if (!items.length) { catDrop.classList.remove("open"); return; }
        items.forEach((c) => {
          const o = document.createElement("div");
          o.className = "opt";
          const label = document.createElement("span");
          label.className = "opt-label";
          label.textContent = c;
          const x = document.createElement("span");
          x.className = "opt-x";
          x.textContent = "✕";
          x.title = "카테고리 삭제(할 일은 미분류로)";
          o.append(label, x);
          o.addEventListener("mousedown", (e) => {
            e.preventDefault();
            catInput.value = c;
            catDrop.classList.remove("open");
          });
          x.addEventListener("mousedown", async (e) => {
            e.preventDefault();
            e.stopPropagation();
            open = (await window.todoAPI.deleteCategory(c)).filter((t) => !t.completed);
            allCats = await window.todoAPI.categories();
            showCatDrop();
            render();
          });
          catDrop.appendChild(o);
        });
        catDrop.classList.add("open");
      }
      catInput.addEventListener("focus", showCatDrop);
      catInput.addEventListener("input", showCatDrop);
      catInput.addEventListener("blur", () => setTimeout(() => catDrop.classList.remove("open"), 120));

      async function refresh() {
        const all = await window.todoAPI.list();
        open = all.filter((t) => !t.completed);
        allCats = await window.todoAPI.categories();
        if (mini) resizeMini();
        else render();
      }
      async function add() {
        const v = $("add-desc").value.trim();
        if (!v) return;
        const category = catInput.value.trim() || undefined;
        $("add-desc").value = ""; catInput.value = "";
        open = (await window.todoAPI.add({ description: v, category })).filter((t) => !t.completed);
        allCats = await window.todoAPI.categories();
        render();
      }

      $("add-desc").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) add(); });
      $("add-cat").addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.isComposing) add(); });
      $("add-btn").addEventListener("click", add);
      $("refresh").addEventListener("click", refresh);
      $("mini-btn").addEventListener("click", () => setMini(true));
      $("mini").addEventListener("click", () => setMini(false));
      $("quit").addEventListener("click", () => window.todoAPI.hide());
      window.todoAPI.onChanged(() => refresh());
      window.addEventListener("resize", applyHeight);

      refresh();
    </script>
  </body>
</html>
